services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: workspace
      POSTGRES_PASSWORD: workspace
      POSTGRES_DB: workspace
    ports:
      - "5432:5432"
    volumes:
      - workspace_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U workspace -d workspace"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
    restart: unless-stopped
    ports:
      - "3003:3003"
    environment:
      PORT: "3003"
      DATABASE_URL: postgres://workspace:workspace@db:5432/workspace?sslmode=disable
    depends_on:
      db:
        condition: service_healthy

volumes:
  workspace_postgres_data:
